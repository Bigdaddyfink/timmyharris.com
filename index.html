  <script>
    document.querySelectorAll('.btn-img').forEach(function(img) {
      var normal = img.src;
      var over = img.dataset.over;
      new Image().src = over;
      img.addEventListener('mouseenter', function() { img.src = over; });
      img.addEventListener('mouseleave', function() { img.src = normal; });
    });
